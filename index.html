                <h2 class="text-xl font-serif font-bold text-slate-800 uppercase tracking-wide">${title}</h2>

                </div>

                <p class="text-sm text-slate-600 mb-5 leading-relaxed">
                    ${project.description}
                </p>

                ${impactSection}

                <div class="flex flex-wrap gap-2 pt-3 border-t border-slate-100 print:border-slate-200">
                    <div class="flex items-center gap-1.5 text-xs font-semibold text-slate-400 mr-1 uppercase tracking-wider">
                        ${renderIcon('layers', 'w-3 h-3')} Tech Stack
                    </div>
                    ${techStack}
                </div>
            </div>`;
        }

        function renderSelfStudyCard(project) {
            const techStack = project.tech.map(t => `
                <span class="text-xs font-medium text-emerald-700 bg-emerald-50 px-2.5 py-0.5 rounded-full border border-emerald-200 print:border-slate-300 print:text-slate-600 print:bg-transparent">
                    ${t}
                </span>`).join('');

            return `
            <div class="project-card group bg-white rounded-lg border border-emerald-100 p-5 transition-all duration-300 hover:shadow-xl hover:-translate-y-1 hover:border-emerald-300 relative overflow-hidden print:border-slate-300 print:shadow-none print:transform-none">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-emerald-400 to-emerald-600 opacity-0 group-hover:opacity-100 transition-opacity print:hidden"></div>

                <div class="flex justify-between items-start mb-3">
                    <div class="flex items-center gap-2 flex-wrap">
                        <h3 class="font-serif font-bold text-slate-800 text-base group-hover:text-emerald-700 transition-colors">
                            ${project.name}
                        </h3>
                        <span class="text-[10px] font-bold uppercase tracking-wider text-emerald-600 bg-emerald-50 border border-emerald-200 px-2 py-0.5 rounded-full print:hidden">
                            Self-Study
                        </span>
                    </div>
                    <a href="${project.github}" target="_blank" rel="noopener noreferrer"
                       class="flex items-center gap-1.5 text-xs font-medium text-slate-500 hover:text-emerald-700 bg-slate-50 hover:bg-emerald-50 px-2.5 py-1 rounded-lg border border-slate-200 hover:border-emerald-300 transition-all whitespace-nowrap shrink-0 ml-2 print:hidden">
                        ${renderIcon('github', 'w-3.5 h-3.5')} GitHub
                    </a>
                </div>

                <p class="text-sm text-slate-600 mb-4 leading-relaxed">
                    ${project.description}
                </p>

                <div class="flex flex-wrap gap-2 pt-3 border-t border-slate-100 print:border-slate-200">
                    <div class="flex items-center gap-1.5 text-xs font-semibold text-slate-400 mr-1 uppercase tracking-wider">
                        ${renderIcon('layers', 'w-3 h-3')} Stack
                    </div>
                    ${techStack}
                </div>
            </div>`;
        }

        // --- MAIN RENDER ---

        function App() {
            const d = RESUME_DATA;
            const initials = d.name.split(' ').map(n => n[0]).join('');

            const profileContent = d.portrait
                ? `<img src="${d.portrait}" alt="${d.name}" class="w-full h-full rounded-full object-cover object-top border-4 border-slate-700 shadow-xl ring-2 ring-primary-500/30 group-hover:scale-105 transition-transform duration-300" />`
                : `<div class="w-full h-full rounded-full bg-slate-800 border-4 border-slate-700 flex items-center justify-center text-white text-3xl font-serif font-bold shadow-xl ring-2 ring-primary-500/30 group-hover:scale-105 transition-transform duration-300">
                    ${initials}
                   </div>`;

            return `
            <div class="min-h-screen p-0 md:p-8">
                <!-- Utility Bar -->
                <div class="max-w-7xl mx-auto mb-4 flex justify-end gap-2 no-print px-4 md:px-0">
                    <button id="privacyBtn" onclick="togglePrivacy()" class="flex items-center gap-2 bg-slate-800 text-white px-4 py-2 rounded shadow hover:bg-slate-700 hover:scale-105 active:scale-95 transition-all text-sm font-medium cursor-pointer">
                        ${renderIcon('eye', 'w-4 h-4')} <span>Secret Mode</span>
                    </button>
                    <button id="printBtn" onclick="window.print()" class="flex items-center gap-2 bg-slate-800 text-white px-4 py-2 rounded shadow hover:bg-slate-700 hover:scale-105 active:scale-95 transition-all text-sm font-medium cursor-pointer">
                        ${renderIcon('printer', 'w-4 h-4')} Print / Save PDF
                    </button>
                </div>

                <!-- Main Container -->
                <main id="resume-container" class="max-w-7xl mx-auto bg-white shadow-2xl rounded-none md:rounded-2xl overflow-hidden flex flex-col md:flex-row">

                    <!-- Sidebar -->
                    <aside class="w-full md:w-[32%] shrink-0 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-slate-300 p-8 flex flex-col gap-8 relative z-10">
                        <!-- Profile Header -->
                        <div class="text-center md:text-left print:text-left">
                            <div class="relative w-32 h-32 mx-auto mb-6 print:hidden group sensitive">
                                ${profileContent}
                            </div>
                            <h1 class="text-3xl font-serif font-bold text-white mb-2 tracking-tight sensitive">${d.name}</h1>
                            <p class="text-primary-400 font-medium text-sm leading-snug">${d.title}</p>
                        </div>

                        <div class="w-full h-px bg-slate-700/50 print:hidden"></div>

                        <!-- Contact -->
                        <div class="space-y-4">
                            ${renderContactItem('phone', d.contact.phone)}
                            ${renderContactItem('mail', d.contact.email, `mailto:${d.contact.email}`)}
                            ${renderContactItem('map-pin', d.contact.location)}
                            ${renderContactItem('linkedin', d.contact.linkedin, d.contact.linkedinUrl)}
                            ${renderContactItem('github', d.contact.github, d.contact.githubUrl)}
                            ${renderContactItem('globe', d.contact.blog)}
                        </div>

                        <div class="w-full h-px bg-slate-700/50 print:hidden"></div>

                        <!-- Target Roles -->
                        <div>
                            ${renderSectionHeader('target', 'Target Roles', true)}
                            <ul class="space-y-2.5">
                                ${d.targetRoles.map(role => `
                                    <li class="flex items-start gap-2 text-sm text-slate-300">
                                        <span class="mt-1.5 w-1.5 h-1.5 rounded-full bg-primary-500 shrink-0"></span>
                                        ${role}
                                    </li>
                                `).join('')}
                            </ul>
                        </div>

                        <div class="w-full h-px bg-slate-700/50 print:hidden"></div>

                        <!-- Skills -->
                        <div>
                            ${renderSectionHeader('book-open', 'Technical Skills', true)}
                            <div class="space-y-5">
                                ${d.skills.map(cat => `
                                    <div class="group">
                                        <h3 class="text-primary-300 text-xs font-bold uppercase mb-2 tracking-wider group-hover:text-primary-200 transition-colors">${cat.title}</h3>
                                        <div class="flex flex-wrap gap-2">
                                            ${cat.skills.map(s => `
                                                <span class="text-xs bg-slate-800/80 px-2.5 py-1 rounded-md text-slate-300 border border-slate-700/50 hover:bg-slate-700 hover:text-white hover:border-primary-500/50 transition-all cursor-default print:bg-transparent print:border-slate-500 print:text-inherit">${s}</span>
                                            `).join('')}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="w-full h-px bg-slate-700/50 print:hidden"></div>

                        <!-- Education -->
                        <div>
                            ${renderSectionHeader('graduation-cap', 'Education', true)}
                            <div class="space-y-5">
                                ${d.education.map(edu => `
                                    <div>
                                        <div class="text-white font-medium text-sm leading-snug">${edu.school}</div>
                                        <div class="text-slate-400 text-xs mt-1">${edu.degree}</div>
                                        <div class="text-slate-500 text-xs italic mt-0.5">${edu.period}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <!-- Languages -->
                        <div>
                             ${renderSectionHeader('languages', 'Languages', true)}
                             <ul class="space-y-2 text-sm text-slate-400">
                                ${d.languages.map(l => `
                                    <li class="flex items-center gap-2">
                                        <span class="w-1.5 h-1.5 rounded-full bg-primary-500"></span>
                                        ${l}
                                    </li>
                                `).join('')}
                             </ul>
                        </div>

                        <!-- Honors -->
                        <div>
                            ${renderSectionHeader('award', 'Honors', true)}
                             <ul class="space-y-3 text-sm text-slate-400">
                                ${d.honors.map(h => `
                                    <li class="flex gap-2 items-start">
                                        <span class="text-primary-500 font-bold text-xs mt-0.5">${h.year}</span>
                                        <span class="leading-snug text-xs">${h.title}</span>
                                    </li>
                                `).join('')}
                             </ul>
                        </div>

                        <!-- QR Code -->
                        <div class="mt-auto pt-4 flex flex-col items-center md:items-start print:pt-4 sensitive">
                            <div class="bg-white p-2 rounded-lg shadow-lg">
                                <img src="https://importsource.github.io/charles/qrcode-about-me.jpg" alt="Resume QR Code" class="w-24 h-24 object-contain print:w-20 print:h-20" />
                            </div>
                            <span class="text-[10px] uppercase tracking-widest text-slate-500 mt-2 font-semibold">Share with one another</span>
                        </div>
                    </aside>

                    <!-- Main Content -->
                    <div class="flex-1 p-8 md:p-12 main-content relative z-10">

                        <!-- Summary -->
                        <section class="mb-10">
                            ${renderSectionHeader('user', 'Professional Summary')}
                            <p class="text-slate-600 leading-relaxed text-sm md:text-base text-justify">
                                ${d.summary}
                            </p>
                        </section>

                        <!-- Management -->
                        <section class="mb-10 bg-slate-50 p-6 rounded-lg border border-slate-100 hover:border-primary-200 hover:shadow-md transition-all duration-300 print:bg-transparent print:border-none print:p-0 print:shadow-none">
                             ${renderSectionHeader('users', 'Management Experience')}
                             <div class="space-y-6">
                                ${d.management.map(m => `
                                    <div>
                                        <div class="flex justify-between items-baseline mb-1">
                                            <h3 class="font-bold text-slate-800">${m.role}</h3>
                                            <span class="text-sm font-semibold text-primary-600 bg-primary-50 px-2 py-0.5 rounded">${m.period}</span>
                                        </div>
                                        <ul class="list-disc list-inside text-sm text-slate-600 space-y-1">
                                            ${m.description.map(desc => `<li>${desc}</li>`).join('')}
                                        </ul>
                                    </div>
                                `).join('')}
                             </div>
                        </section>

                        <!-- Experience -->
                        <section class="mb-10">
                            ${renderSectionHeader('briefcase', 'Work Experience')}
                            <div class="mt-6">
                                ${d.experience.map((exp, idx) => renderTimelineItem(exp, idx === d.experience.length - 1)).join('')}
                            </div>
                        </section>

                        <!-- Key Projects -->
                        <section class="mb-10">
                            ${renderSectionHeader('folder-open', 'Key Projects')}
                            <div class="grid grid-cols-1 gap-6">
                                ${d.projects.map(p => renderProjectCard(p)).join('')}
                            </div>
                        </section>

                        <!-- Self-Study Projects -->
                        <section class="mb-10">
                            ${renderSectionHeader('lightbulb', 'Self-Study Projects')}
                            <p class="text-sm text-slate-500 -mt-3 mb-6 italic">Personal engineering explorations — built from scratch to deepen system-level and infrastructure understanding.</p>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                ${d.selfStudyProjects.map(p => renderSelfStudyCard(p)).join('')}
                            </div>
                        </section>

                    </div>
                </main>

                <footer class="max-w-7xl mx-auto mt-8 text-center text-slate-400 text-sm pb-8 print:hidden">
                    <p>&copy; ${new Date().getFullYear()} Charles He. All rights reserved.</p>
                </footer>
            </div>
            `;
        }

        // Initialize
        document.getElementById('app').innerHTML = App();
        lucide.createIcons();

        // Privacy Toggle Logic
        let isPrivacyMode = false;
        window.togglePrivacy = function() {
            isPrivacyMode = !isPrivacyMode;
            document.body.classList.toggle('privacy-mode');

            const btn = document.getElementById('privacyBtn');
            const iconName = isPrivacyMode ? 'eye-off' : 'eye';
            const text = isPrivacyMode ? 'Show Identity' : 'Secret Mode';

            btn.innerHTML = `${renderIcon(iconName, 'w-4 h-4')} <span>${text}</span>`;
            lucide.createIcons();
        }
    </script>
</body>
</html>
